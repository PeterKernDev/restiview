# pubspec.yaml
#
name: restiview
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.6.4+25

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  firebase_database: ^12.1.1
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_rating_bar: ^4.0.0
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  geolocator: ^14.0.1
  http: ^1.1.0
  url_launcher: ^6.2.5
  diacritic: ^0.1.3
  package_info_plus: ^9.0.0
  flutter_secure_storage: ^10.0.0
  # added for image processing and temp file naming
  image: ^4.0.17
  uuid: ^4.0.0

  # Added for reverse geocoding (lat/lng to country)
  geocoding: ^4.0.0

  disk_space_2: ^1.0.11
  shared_preferences: ^2.2.2

  gal: ^2.3.2



fonts:
  - family: Gelica
    fonts:
      - asset: fonts/Gelica-Regular.ttf
      - asset: fonts/Gelica-Bold.ttf
        weight: 700


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  

flutter:
  uses-material-design: true

  assets:
    - assets/restiview_icon_V4_yg.png
    